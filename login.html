<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Mindfuels</title>
  <!-- Google Fonts -->
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --primary: #FFD21E;
      /* Mindfuels Yellow */
      --primary-dark: #e6bd1b;
      --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      --card-bg: rgba(255, 255, 255, 0.95);
      --text-main: #1e293b;
      --text-muted: #64748b;
      --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: linear-gradient(135deg, rgba(248, 250, 252, 0.85) 0%, rgba(226, 232, 240, 0.85) 100%),
        url('photos/Login_bg.jpeg') center center / cover no-repeat fixed;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow-x: hidden;
    }

    /* ── Background Elements ── */
    .bg-blobs {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      overflow: hidden;
    }

    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.3;
      animation: float 20s infinite alternate;
    }

    .blob-1 {
      width: 400px;
      height: 400px;
      background: #FFD21E;
      top: -100px;
      left: -100px;
    }

    .blob-2 {
      width: 300px;
      height: 300px;
      background: #3b82f6;
      bottom: -50px;
      right: -50px;
      animation-delay: -5s;
    }

    @keyframes float {
      0% {
        transform: translate(0, 0) scale(1);
      }

      100% {
        transform: translate(50px, 50px) scale(1.1);
      }
    }

    /* ── Card ── */
    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 32px;
      padding: 56px 48px;
      width: 100%;
      max-width: 480px;
      box-shadow: var(--glass-shadow);
      border: 1px solid rgba(255, 255, 255, 0.3);
      position: relative;
      transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: center;
    }

    /* ── Logo ── */
    .logo-container {
      margin-bottom: 40px;
    }

    .logo-container h1 {
      font-family: 'Playfair Display', serif;
      font-size: 36px;
      color: var(--text-main);
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .logo-container p {
      color: var(--text-muted);
      font-size: 16px;
      font-weight: 400;
      line-height: 1.5;
    }

    /* ── Sections ── */
    .section {
      display: none;
      opacity: 0;
      transform: translateY(20px);
    }

    .section.active {
      display: block;
      opacity: 1;
      transform: translateY(0);
      animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 16px 24px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border: none;
      outline: none;
      position: relative;
    }

    .btn-google {
      background: #ffffff;
      color: var(--text-main);
      border: 1.5px solid #e2e8f0;
      margin-top: 10px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
    }

    .btn-google:hover {
      background: #f8fafc;
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.08);
      border-color: #cbd5e1;
    }

    .btn-google:active {
      transform: translateY(0);
    }

    .google-icon {
      width: 22px;
      height: 22px;
    }

    .btn-primary {
      background: var(--primary);
      color: #1a1a1a;
      margin-top: 32px;
      box-shadow: 0 4px 14px rgba(255, 210, 30, 0.3);
    }

    .btn-primary:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(255, 210, 30, 0.4);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    /* ── Input ── */
    .input-group {
      text-align: left;
      margin-top: 32px;
    }

    .input-group label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 10px;
      margin-left: 4px;
    }

    input[type="text"] {
      width: 100%;
      padding: 16px 20px;
      border-radius: 16px;
      border: 2px solid #e2e8f0;
      font-size: 16px;
      color: var(--text-main);
      transition: all 0.3s;
      font-family: inherit;
      background: #f8fafc;
    }

    input[type="text"]:focus {
      border-color: var(--primary);
      background: #fff;
      box-shadow: 0 0 0 5px rgba(255, 210, 30, 0.15);
      outline: none;
    }

    /* ── Welcome Message ── */
    .welcome-msg {
      font-size: 20px;
      line-height: 1.7;
      color: #334155;
      font-weight: 400;
    }

    .username-highlight {
      color: #2563eb;
      font-weight: 700;
      display: inline-block;
      margin: 0 4px;
      border-bottom: 3px solid var(--primary);
    }

    /* ── Loading Spinner ── */
    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(0, 0, 0, 0.05);
      border-top-color: #1a1a1a;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
      position: absolute;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading .spinner {
      display: block;
    }

    .loading .btn-text,
    .loading .google-icon {
      visibility: hidden;
    }

    /* ── Welcome Decor ── */
    .welcome-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .book-icon {
      font-size: 64px;
      margin-bottom: 8px;
      filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.1));
    }

    @keyframes gentleBounce {

      0%,
      100% {
        transform: translateY(0) rotate(0);
      }

      50% {
        transform: translateY(-15px) rotate(5deg);
      }
    }

    /* ── Alerts ── */
    #alertBox {
      background: #fee2e2;
      color: #b91c1c;
      padding: 12px;
      border-radius: 12px;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }

    /* ── Responsive ── */
    @media (max-width: 520px) {
      .login-card {
        padding: 48px 24px;
        margin: 0 16px;
        border-radius: 28px;
      }

      .logo-container h1 {
        font-size: 30px;
      }

      .welcome-msg {
        font-size: 18px;
      }
    }
  </style>
</head>

<body>

  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <main class="login-card" id="loginCard">
    <div class="logo-container">
      <h1>Mindfuels</h1>
      <p id="tagline">Let's Fuel Our Imagination</p>
    </div>

    <!-- State 1: Login -->
    <div id="section-login" class="section active">
      <button class="btn btn-google" id="googleBtn" onclick="handleGoogle()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
            fill="#4285F4" />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34A853" />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#FBBC05" />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#EA4335" />
        </svg>
        <span class="btn-text">Continue with Google</span>
        <div class="spinner"></div>
      </button>
      <div id="alertBox"></div>
    </div>

    <!-- State 2: Username -->
    <div id="section-username" class="section">
      <div class="input-group">
        <label for="usernameInput">Enter Your Name</label>
        <input type="text" id="usernameInput" placeholder="Enter username..." autocomplete="off">
      </div>
      <button class="btn btn-primary" id="usernameBtn" onclick="submitUsername()">
        <span class="btn-text">Continue</span>
        <div class="spinner"></div>
      </button>
    </div>

    <!-- State 3: Welcome -->
    <div id="section-welcome" class="section">
      <div class="welcome-container">
        <div class="book-icon">
          <img src="photos/logo_head.jpeg" alt="Mindfuels Logo" style="width: 100px; height: auto; border-radius: 12px; box-shadow: var(--glass-shadow);">
        </div>
        <div class="welcome-msg" id="welcomeMsg"></div>
        <button class="btn btn-primary" style="margin-top: 8px;" onclick="goToMain()">
          Start Exploring
        </button>
      </div>
    </div>

  </main>

  <!-- Auth0 SDK -->
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
  <script>
    const AUTH0_DOMAIN = 'mindfuels.us.auth0.com';
    const AUTH0_CLIENT_ID = 'HOTM4KSpHLFFmdXYchCP2vYDtgTBDfJW';
    const REDIRECT_URI = window.location.origin + window.location.pathname;

    let auth0Client = null;

    async function initAuth0() {
      try {
        auth0Client = await auth0.createAuth0Client({
          domain: AUTH0_DOMAIN,
          clientId: AUTH0_CLIENT_ID,
          authorizationParams: {
            redirect_uri: REDIRECT_URI,
          },
          cacheLocation: 'localstorage'
        });

        // Handle Auth0 Callback
        if (window.location.search.includes('code=') || window.location.search.includes('error=')) {
          await auth0Client.handleRedirectCallback();
          window.history.replaceState({}, document.title, window.location.pathname);
          showSection('username');
          return;
        }

        // Check if already authenticated but direct access (not from redirect)
        const isAuthenticated = await auth0Client.isAuthenticated();
        if (isAuthenticated) {
          // If we haven't shown welcome this session, show username prompt
          if (!sessionStorage.getItem('mindfuels_welcome_shown')) {
            showSection('username');
          } else {
            // Optional: direct to home if already done
            // window.location.href = 'index.html';
          }
        }
      } catch (err) {
        console.error('Auth0 Error:', err);
      }
    }

    function showSection(id) {
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      const activeSection = document.getElementById(`section-${id}`);
      activeSection.classList.add('active');

      const tagline = document.getElementById('tagline');
      if (id === 'username') {
        tagline.textContent = 'Welcome back! Let us know who you are.';
      } else if (id === 'welcome') {
        tagline.textContent = 'Ready for takeoff!';
      }
    }

    async function handleGoogle() {
      const btn = document.getElementById('googleBtn');
      btn.classList.add('loading');
      try {
        await auth0Client.loginWithPopup({
          authorizationParams: {
            connection: 'google-oauth2',
          }
        });
        // Popup closed successfully with authentication
        showSection('username');
      } catch (err) {
        btn.classList.remove('loading');
        const alert = document.getElementById('alertBox');
        alert.textContent = "Couldn't connect to Google. Please try again.";
        alert.style.display = 'block';
      }
    }

    function submitUsername() {
      const input = document.getElementById('usernameInput');
      const username = input.value.trim();

      if (!username) {
        input.style.borderColor = '#ef4444';
        return;
      }

      const btn = document.getElementById('usernameBtn');
      btn.classList.add('loading');

      // Add a slight delay for better UX feel
      setTimeout(() => {
        const message = `Happy to have you <span class="username-highlight">${username}</span> here, welcome to our world of books where young readers find their fuel for future flight`;
        document.getElementById('welcomeMsg').innerHTML = message;

        sessionStorage.setItem('mindfuels_welcome_shown', 'true');
        localStorage.setItem('mindfuels_username', username);

        showSection('welcome');
        btn.classList.remove('loading');
      }, 1000);
    }

    function goToMain() {
      window.location.href = 'index.html';
    }

    document.getElementById('usernameInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') submitUsername();
      e.target.style.borderColor = '#e2e8f0';
    });

    window.onload = initAuth0;
  </script>
</body>

</html>
