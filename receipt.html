<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Receipt — Mindfuels</title>
  <meta name="description" content="Your Mindfuels order receipt and invoice.">
  <link rel="icon" href="photos/favicon.ico">
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    :root {
      --primary: #F6AB06;
      --primary-dark: #e09800;
      --text-dark: #1a1a1a;
      --text-light: #666;
      --bg-gray: #f8f9fa;
      --border-color: #eee;
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Outfit', sans-serif;
      background: #f4f6f8;
      color: var(--text-dark);
      min-height: 100vh;
      -webkit-print-color-adjust: exact;
    }

    /* ── Actions Bar ── */
    .actions-bar {
      max-width: 850px;
      margin: 0 auto;
      padding: 24px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 15px;
    }

    .back-link {
      color: var(--text-light);
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .back-link:hover {
      color: var(--primary);
    }

    .action-btns {
      display: flex;
      gap: 12px;
    }

    .btn-action {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .btn-download {
      background: var(--text-dark);
      color: white;
    }

    .btn-download:hover {
      background: #000;
      transform: translateY(-1px);
    }

    .btn-print {
      background: white;
      color: var(--text-dark);
      border: 1px solid var(--border-color);
    }

    .btn-print:hover {
      background: var(--bg-gray);
    }

    /* ── Receipt Styles ── */
    .receipt {
      max-width: 850px;
      margin: 0 auto 60px;
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.05);
      position: relative;
    }

    /* Gold accent header */
    .receipt-top-bar {
      height: 8px;
      background: linear-gradient(90deg, #FFD700, var(--primary), #FFD700);
    }

    .receipt-inner {
      padding: 50px 60px;
    }

    /* ── Header ── */
    .header-layout {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 45px;
    }

    .company-logo-section {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .logo-main {
      height: 70px;
      width: auto;
      object-fit: contain;
    }

    .company-name {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      color: var(--text-dark);
    }

    .company-sub {
      font-size: 12px;
      color: var(--text-light);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .meta-section {
      text-align: right;
    }

    .invoice-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-dark);
      letter-spacing: -1px;
      margin-bottom: 12px;
    }

    .meta-grid {
      display: grid;
      gap: 6px;
    }

    .meta-row {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
      font-size: 14px;
    }

    .label {
      color: var(--text-light);
    }

    .value {
      font-weight: 600;
    }

    .tag-paid {
      background: #E8F5E9;
      color: #2E7D32;
      padding: 2px 10px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    /* ── Items Table ── */
    .table-container {
      margin: 40px 0;
    }

    .receipt-table {
      width: 100%;
      border-collapse: collapse;
    }

    .receipt-table th {
      text-align: left;
      padding: 15px 10px;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-light);
      text-transform: uppercase;
      border-bottom: 2px solid var(--text-dark);
    }

    .receipt-table td {
      padding: 20px 10px;
      border-bottom: 1px solid var(--border-color);
      font-size: 15px;
    }

    .prod-cell {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .prod-img {
      width: 50px;
      height: 50px;
      border-radius: 8px;
      object-fit: cover;
      background: #f9f9f9;
    }

    .prod-name {
      font-weight: 600;
      max-width: 300px;
    }

    .text-right {
      text-align: right;
    }

    .text-center {
      text-align: center;
    }

    /* ── Summary ── */
    .summary-layout {
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 60px;
      padding-top: 30px;
    }

    .info-box h4 {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 15px;
      color: var(--text-light);
    }

    .addr-text {
      font-size: 14px;
      line-height: 1.6;
      color: #444;
    }

    .totals-list {
      display: grid;
      gap: 12px;
    }

    .total-line {
      display: flex;
      justify-content: space-between;
      font-size: 15px;
    }

    .total-line.final {
      margin-top: 15px;
      padding-top: 15px;
      border-top: 2px solid var(--text-dark);
      font-size: 22px;
      font-weight: 800;
    }

    /* ── Footer ── */
    .receipt-footer {
      background: var(--bg-gray);
      padding: 40px 60px;
      text-align: center;
    }

    .footer-grid {
      display: flex;
      justify-content: center;
      gap: 40px;
      margin-bottom: 30px;
    }

    .footer-item {
      font-size: 13px;
      color: var(--text-light);
    }

    .note-section {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-dark);
    }

    .tagline {
      font-size: 12px;
      color: var(--text-light);
      margin-top: 8px;
    }

    /* ── Loading & Error ── */
    .loading-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 5px solid #eee;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media print {
      body {
        background: white;
        padding: 0;
      }

      .actions-bar {
        display: none;
      }

      .receipt {
        box-shadow: none;
        border-radius: 0;
        max-width: 100%;
      }

      .receipt-inner {
        padding: 0.5in;
      }
    }

    @media (max-width: 700px) {
      .receipt-inner {
        padding: 30px 25px;
      }

      .header-layout {
        flex-direction: column;
        gap: 30px;
      }

      .meta-section {
        text-align: left;
      }

      .meta-row {
        justify-content: flex-start;
      }

      .summary-layout {
        grid-template-columns: 1fr;
        gap: 40px;
      }

      .invoice-title {
        font-size: 26px;
      }
    }
  </style>
</head>

<body>

  <div class="actions-bar">
    <a href="products" class="back-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      Back to Shop
    </a>
    <div class="action-btns">
      <button onclick="downloadPDF()" class="btn-action btn-print">Download PDF</button>
      <button onclick="window.print()" class="btn-action btn-print">Print Receipt</button>
    </div>
  </div>

  <div id="loading" class="loading-wrap">
    <div class="spinner"></div>
    <p style="margin-top: 20px; color: #888;">Preparing your receipt...</p>
  </div>

  <div id="receipt" class="receipt" style="display:none;">
    <div class="receipt-top-bar"></div>
    <div class="receipt-inner" id="receiptInner"></div>
    <div class="receipt-footer" id="receiptFooter"></div>
  </div>

  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
  <script src="auth.js?v=13"></script>

  <script>
    const API_BASE = 'https://mindfuels-backend-aopx.onrender.com/api';
    let currentOrderName = 'Receipt';

    async function loadOrder() {
      // Wait for auth
      let client = await new Promise(r => {
        const i = setInterval(() => { if (window.auth0Client) { clearInterval(i); r(window.auth0Client); } }, 100);
      });

      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('orderId');

      if (!orderId) {
        document.getElementById('loading').innerHTML = "<h2>Order not found</h2>";
        return;
      }

      try {
        const token = await client.getTokenSilently();
        const res = await fetch(`${API_BASE}/orders/${orderId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });
        if (!res.ok) throw new Error('Failed to fetch');
        const order = await res.json();
        render(order);
      } catch (err) {
        document.getElementById('loading').innerHTML = "<h2>Error loading receipt</h2>";
      }
    }

    function render(order) {
      const displayId = order.displayId || `#ORD-${9900 + order.id}`;
      currentOrderName = displayId.replace('#', '');

      const dateStr = new Date(order.created_at).toLocaleDateString('en-IN', {
        day: '2-digit', month: 'long', year: 'numeric'
      });

      const fmt = (n) => '₹' + Number(n).toLocaleString('en-IN');

      // Top Section
      const topHtml = `
        <div class="header-layout">
          <div class="company-logo-section">
            <img src="photos/full_logo.jpeg" alt="Mindfuels" class="logo-main" crossorigin="anonymous">
            <div>
              <p class="company-name">Mindfuels Publisher and Distributors</p>
              <p class="company-sub">Leading Educational Publisher</p>
            </div>
          </div>
          <div class="meta-section">
            <h1 class="invoice-title">ORDER RECEIPT</h1>
            <div class="meta-grid">
              <div class="meta-row"><span class="label">Invoice No:</span> <span class="value">${displayId}</span></div>
              <div class="meta-row"><span class="label">Date:</span> <span class="value">${dateStr}</span></div>
              <div class="meta-row"><span class="label">Status:</span> <span class="tag-paid">Paid</span></div>
            </div>
          </div>
        </div>

        <div class="table-container">
          <table class="receipt-table">
            <thead>
              <tr>
                <th>Item Details</th>
                <th class="text-center">Qty</th>
                <th class="text-right">Price</th>
                <th class="text-right">Total</th>
              </tr>
            </thead>
            <tbody>
              ${order.items.map(item => `
                <tr>
                  <td>
                    <div class="prod-cell">
                      <img src="${item.image1 || 'photos/placeholder.png'}" class="prod-img" crossorigin="anonymous">
                      <div class="prod-name">${item.title}</div>
                    </div>
                  </td>
                  <td class="text-center">${item.quantity}</td>
                  <td class="text-right">${fmt(item.price)}</td>
                  <td class="text-right"><strong>${fmt(item.price * item.quantity)}</strong></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>

        <div class="summary-layout">
          <div class="info-box">
            <div style="margin-bottom: 25px;">
              <h4>Delivered To</h4>
              <p class="addr-text"><strong>${order.full_name}</strong></p>
              <p class="addr-text">${order.address_line1}</p>
              ${order.address_line2 ? `<p class="addr-text">${order.address_line2}</p>` : ''}
              <p class="addr-text">${order.city}, ${order.state} - ${order.pincode}</p>
              <p class="addr-text">T: ${order.phone}</p>
            </div>
            <div style="margin-bottom: 25px;">
              <h4>Payment Information</h4>
              <p class="addr-text">Method: Razorpay Online</p>
              <p class="addr-text">Transaction ID: <span style="font-family: monospace;">${order.payment_id || 'NA'}</span></p>
              <p class="addr-text">Payment Order ID: <span style="font-family: monospace;">${order.payment_order_id || 'NA'}</span></p>
            </div>
            <div>
              <h4>Shipping Information</h4>
              <p class="addr-text">Delivery Partner: <span style="font-weight: 600;">${order.courier_name || 'Processing...'}</span></p>
              ${order.awb_code && order.awb_code !== 'PENDING' ?
          `<p class="addr-text">Tracking ID: <a href="https://track.fship.in/${order.awb_code}" target="_blank" style="color: var(--primary); text-decoration: underline; font-weight: 600; cursor: pointer;">${order.awb_code} (Track)</a></p>` :
          `<p class="addr-text">Tracking ID: <span style="font-weight: 600;">Generating...</span></p>`
        }
            </div>
          </div>
          <div class="totals-section">
            <h4>Payment Summary</h4>
            <div class="totals-list">
              <div class="total-line"><span class="label">Item Subtotal</span> <span>${fmt(order.total_amount - (order.shipping_charge || 0))}</span></div>
              <div class="total-line"><span class="label">Shipping Fee</span> <span style="${(order.shipping_charge || 0) === 0 ? 'color:#2E7D32; font-weight:600;' : ''}">${(order.shipping_charge || 0) > 0 ? fmt(order.shipping_charge) : 'FREE'}</span></div>
              <div class="total-line final"><span>Amount Paid</span> <span>${fmt(order.total_amount)}</span></div>
            </div>
          </div>
        </div>
      `;

      const footerHtml = `
        <div class="footer-grid">
           <div class="footer-item">📧 <a href="mailto:support@mindfuelspublisher.com" style="color: inherit; text-decoration: underline;">support@mindfuelspublisher.com</a></div>
           <div class="footer-item">🌐 <a href="https://www.mindfuelspublisher.com" target="_blank" style="color: inherit; text-decoration: underline;">www.mindfuelspublisher.com</a></div>
        </div>
        <div class="note-section">
           Thank you for shopping with Mindfuels! 📚
        </div>
        <div class="tagline">Empowering young minds, one book at a time.</div>
      `;

      document.getElementById('receiptInner').innerHTML = topHtml;
      document.getElementById('receiptFooter').innerHTML = footerHtml;
      document.getElementById('loading').style.display = 'none';
      document.getElementById('receipt').style.display = 'block';
      document.title = `Receipt ${displayId} — Mindfuels`;
    }

    function downloadPDF() {
      const element = document.getElementById('receipt');
      const opt = {
        margin: [0.2, 0.2, 0.2, 0.2],
        filename: `Mindfuels_Order_${currentOrderName}.pdf`,
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true },
        jsPDF: { unit: 'in', format: 'a4', orientation: 'portrait' }
      };
      html2pdf().set(opt).from(element).save();
    }

    loadOrder();
  </script>
</body>

</html>
