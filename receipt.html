<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Order Receipt — Mindfuels</title>
  <meta name="description" content="Your Mindfuels order receipt and invoice.">
  <link rel="icon" href="photos/favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f2f5;
      color: #1d1e20;
      min-height: 100vh;
    }

    /* ── Actions Bar ── */
    .actions-bar {
      max-width: 820px;
      margin: 0 auto;
      padding: 20px 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .back-link {
      color: #555;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      transition: color 0.2s;
    }
    .back-link:hover { color: #F6AB06; }
    .action-btns { display: flex; gap: 10px; }
    .btn-action {
      padding: 10px 22px;
      border: none;
      border-radius: 8px;
      font-family: inherit;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .btn-action:hover { transform: translateY(-1px); }
    .btn-download {
      background: linear-gradient(135deg, #F6AB06, #e09800);
      color: #1d1e20;
      box-shadow: 0 2px 8px rgba(246,171,6,0.3);
    }
    .btn-print {
      background: #e5e7eb;
      color: #333;
    }

    /* ── Loading ── */
    .loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 100px 20px;
      color: #888;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #F6AB06;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Receipt Container ── */
    .receipt {
      max-width: 820px;
      margin: 0 auto 40px;
      background: white;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
    }

    /* Gold accent bar at top */
    .receipt::before {
      content: '';
      display: block;
      height: 5px;
      background: linear-gradient(90deg, #F6AB06, #e09800, #F6AB06);
    }

    .receipt-inner { padding: 40px 44px; }

    /* ── Header ── */
    .receipt-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-wrap: wrap;
      gap: 24px;
      margin-bottom: 32px;
    }
    .brand { display: flex; align-items: center; gap: 16px; }
    .brand .logo { height: 52px; width: auto; }
    .brand-info h2 {
      font-size: 20px;
      font-weight: 800;
      color: #1d1e20;
      letter-spacing: -0.3px;
    }
    .brand-info p {
      font-size: 12px;
      color: #6D7081;
      line-height: 1.5;
    }
    .receipt-meta { text-align: right; }
    .receipt-meta h1 {
      font-size: 22px;
      font-weight: 800;
      color: #F6AB06;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .meta-row {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      font-size: 13px;
      margin-bottom: 4px;
    }
    .meta-label { color: #6D7081; }
    .meta-value { font-weight: 600; color: #1d1e20; }
    .status-paid {
      color: #16a34a;
      background: #f0fdf4;
      padding: 1px 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1.5px solid #f0f0f0;
      margin: 28px 0;
    }

    /* ── Section Titles ── */
    .section-title {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #6D7081;
      margin-bottom: 16px;
    }

    /* ── Items Table ── */
    .items-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    .items-table thead th {
      background: #fafafa;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #6D7081;
      padding: 12px 14px;
      border-bottom: 2px solid #f0f0f0;
      text-align: left;
    }
    .items-table tbody td {
      padding: 14px;
      border-bottom: 1px solid #f5f5f5;
      vertical-align: middle;
    }
    .items-table tbody tr:last-child td { border-bottom: none; }
    .items-table .center { text-align: center; }
    .items-table .right { text-align: right; }
    .item-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .item-thumb {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid #eee;
    }
    .item-name { font-weight: 500; line-height: 1.3; }

    /* ── Totals ── */
    .totals-section {
      display: flex;
      justify-content: flex-end;
      margin-top: 8px;
    }
    .totals-box { width: 300px; }
    .total-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      font-size: 14px;
      color: #555;
    }
    .total-row.discount { color: #16a34a; }
    .total-row.grand-total {
      border-top: 2px solid #1d1e20;
      margin-top: 8px;
      padding-top: 14px;
      font-size: 18px;
      font-weight: 800;
      color: #1d1e20;
    }

    /* ── Info Grid (Shipping + Payment) ── */
    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }
    .info-block h3 {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #6D7081;
      margin-bottom: 14px;
    }
    .info-block p {
      font-size: 14px;
      line-height: 1.7;
      color: #333;
    }
    .info-block .name {
      font-weight: 700;
      font-size: 15px;
      color: #1d1e20;
    }
    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 6px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    .info-row span:first-child { color: #6D7081; }
    .info-row span:last-child { font-weight: 600; color: #1d1e20; }
    .badge-paid {
      background: #f0fdf4;
      color: #16a34a;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
    }
    .badge-pending {
      background: #fffbeb;
      color: #d97706;
      padding: 2px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 700;
    }

    /* ── Footer ── */
    .receipt-footer {
      background: #fafafa;
      border-radius: 12px;
      padding: 24px 28px;
      margin-top: 8px;
    }
    .footer-info p {
      font-size: 13px;
      line-height: 1.8;
      color: #555;
    }
    .footer-info strong { color: #1d1e20; }
    .thank-you {
      text-align: center;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #e5e5e5;
    }
    .thank-you p {
      font-size: 16px;
      font-weight: 700;
      color: #1d1e20;
    }
    .thank-you .tagline {
      font-size: 13px;
      font-weight: 400;
      color: #6D7081;
      margin-top: 4px;
    }

    /* ── Error State ── */
    .error-state {
      text-align: center;
      padding: 80px 20px;
      color: #888;
    }
    .error-state h2 { font-size: 20px; color: #1d1e20; margin-bottom: 8px; }
    .error-state p { font-size: 14px; }
    .error-state a { color: #F6AB06; text-decoration: none; font-weight: 600; }

    /* ── Print Styles ── */
    @media print {
      body { background: white; }
      .actions-bar { display: none !important; }
      .receipt {
        box-shadow: none;
        border-radius: 0;
        margin: 0;
      }
      .receipt::before { display: none; }
    }

    /* ── Mobile Responsive ── */
    @media (max-width: 640px) {
      .receipt-inner { padding: 24px 20px; }
      .receipt-header { flex-direction: column; }
      .receipt-meta { text-align: left; }
      .meta-row { justify-content: flex-start; }
      .info-grid { grid-template-columns: 1fr; gap: 24px; }
      .totals-box { width: 100%; }
      .items-table { font-size: 13px; }
      .items-table thead th { padding: 10px 8px; font-size: 10px; }
      .items-table tbody td { padding: 10px 8px; }
      .item-thumb { width: 36px; height: 36px; }
    }
  </style>
</head>
<body>

  <!-- ── Actions Bar (hidden in PDF/Print) ── -->
  <div class="actions-bar" id="actionsBar">
    <a href="products.html" class="back-link">← Back to Shop</a>
    <div class="action-btns">
      <button onclick="downloadPDF()" class="btn-action btn-download">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download PDF
      </button>
      <button onclick="window.print()" class="btn-action btn-print">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Print
      </button>
    </div>
  </div>

  <!-- ── Loading ── -->
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Loading your receipt...</p>
  </div>

  <!-- ── Receipt (populated by JS) ── -->
  <div id="receipt" class="receipt" style="display:none;">
    <div class="receipt-inner" id="receiptInner"></div>
  </div>

  <!-- ── Auth0 SDK + auth.js ── -->
  <script src="https://cdn.auth0.com/js/auth0-spa-js/2.0/auth0-spa-js.production.js"></script>
  <script src="auth.js?v=3"></script>

  <script>
    const API_BASE = 'https://mindfuels-backend-aopx.onrender.com/api';
    let currentDisplayId = 'Receipt';

    // ── Wait for Auth0 to initialize ──
    function waitForAuth() {
      return new Promise((resolve) => {
        const check = setInterval(() => {
          if (window.auth0Client !== undefined) {
            clearInterval(check);
            resolve();
          }
        }, 200);
        setTimeout(() => { clearInterval(check); resolve(); }, 12000);
      });
    }

    // ── Main: load receipt data ──
    async function loadReceipt() {
      await waitForAuth();

      if (!window.auth0Client || !window.isUserLoggedIn) {
        document.getElementById('loading').innerHTML = `
          <div class="error-state">
            <h2>Please Sign In</h2>
            <p>You need to be logged in to view your receipt.</p>
            <p style="margin-top:16px"><a href="login.html">Sign In →</a></p>
          </div>`;
        return;
      }

      const params = new URLSearchParams(window.location.search);
      const orderId = params.get('orderId');

      if (!orderId) {
        document.getElementById('loading').innerHTML = `
          <div class="error-state">
            <h2>No Order Found</h2>
            <p>No order ID was provided.</p>
            <p style="margin-top:16px"><a href="products.html">Continue Shopping →</a></p>
          </div>`;
        return;
      }

      try {
        const token = await window.auth0Client.getTokenSilently();
        const res = await fetch(`${API_BASE}/orders/${orderId}`, {
          headers: { 'Authorization': `Bearer ${token}` }
        });

        if (!res.ok) throw new Error('Failed to load order details');
        const order = await res.json();

        renderReceipt(order);
      } catch (err) {
        console.error('Receipt load error:', err);
        document.getElementById('loading').innerHTML = `
          <div class="error-state">
            <h2>Could Not Load Receipt</h2>
            <p>${err.message}</p>
            <p style="margin-top:16px"><a href="cart.html">Back to Cart →</a></p>
          </div>`;
      }
    }

    // ── Render the receipt HTML ──
    function renderReceipt(order) {
      const displayId = order.displayId || `#ORD-${9900 + order.id}`;
      currentDisplayId = displayId;

      const orderDate = new Date(order.created_at).toLocaleDateString('en-IN', {
        day: '2-digit', month: 'long', year: 'numeric'
      });
      const orderTime = new Date(order.created_at).toLocaleTimeString('en-IN', {
        hour: '2-digit', minute: '2-digit'
      });

      // Calculate totals
      let mrpTotal = 0;
      let sellTotal = 0;
      order.items.forEach(item => {
        mrpTotal += parseFloat(item.mrp || item.price) * item.quantity;
        sellTotal += parseFloat(item.price) * item.quantity;
      });
      const discount = mrpTotal - sellTotal;
      const grandTotal = parseFloat(order.total_amount);

      const fmt = (n) => '₹' + Number(n).toLocaleString('en-IN');

      // Build item rows
      const itemRows = order.items.map((item, i) => `
        <tr>
          <td class="center">${i + 1}</td>
          <td>
            <div class="item-info">
              ${item.image1 ? `<img src="${item.image1}" alt="" class="item-thumb" crossorigin="anonymous">` : ''}
              <span class="item-name">${item.title}</span>
            </div>
          </td>
          <td class="center">${item.quantity}</td>
          <td class="right">${fmt(item.mrp || item.price)}</td>
          <td class="right">${fmt(item.price)}</td>
          <td class="right"><strong>${fmt(item.price * item.quantity)}</strong></td>
        </tr>
      `).join('');

      // Build receipt
      const html = `
        <!-- ── HEADER ── -->
        <div class="receipt-header">
          <div class="brand">
            <img src="photos/logo.png" alt="Mindfuels" class="logo" crossorigin="anonymous">
            <div class="brand-info">
              <h2>Mindfuels Publisher</h2>
              <p>India's Leading Educational Publisher</p>
              <p>www.mindfuelspublisher.com</p>
            </div>
          </div>
          <div class="receipt-meta">
            <h1>ORDER RECEIPT</h1>
            <div class="meta-row">
              <span class="meta-label">Order ID:</span>
              <span class="meta-value" id="displayId">${displayId}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Date:</span>
              <span class="meta-value">${orderDate}, ${orderTime}</span>
            </div>
            <div class="meta-row">
              <span class="meta-label">Payment:</span>
              <span class="meta-value status-paid">✅ ${order.payment_status || 'Paid'}</span>
            </div>
          </div>
        </div>

        <hr class="divider">

        <!-- ── ITEMS ── -->
        <div>
          <h3 class="section-title">Items Ordered</h3>
          <table class="items-table">
            <thead>
              <tr>
                <th class="center" style="width:40px">#</th>
                <th>Product</th>
                <th class="center" style="width:60px">Qty</th>
                <th class="right" style="width:90px">MRP</th>
                <th class="right" style="width:90px">Price</th>
                <th class="right" style="width:100px">Total</th>
              </tr>
            </thead>
            <tbody>
              ${itemRows}
            </tbody>
          </table>
        </div>

        <!-- ── TOTALS ── -->
        <div class="totals-section">
          <div class="totals-box">
            <div class="total-row">
              <span>Subtotal (MRP)</span>
              <span>${fmt(mrpTotal)}</span>
            </div>
            ${discount > 0 ? `
            <div class="total-row discount">
              <span>Discount</span>
              <span>– ${fmt(discount)}</span>
            </div>` : ''}
            <div class="total-row">
              <span>Shipping</span>
              <span>Free</span>
            </div>
            <div class="total-row grand-total">
              <span>Amount Paid</span>
              <span>${fmt(grandTotal)}</span>
            </div>
          </div>
        </div>

        <hr class="divider">

        <!-- ── SHIPPING & PAYMENT ── -->
        <div class="info-grid">
          <div class="info-block">
            <h3>Shipping Address</h3>
            <p class="name">${order.full_name || '—'}</p>
            <p>${order.address_line1 || ''}</p>
            ${order.address_line2 ? `<p>${order.address_line2}</p>` : ''}
            <p>${order.city || ''}, ${order.state || ''} — ${order.pincode || ''}</p>
            <p>Phone: ${order.phone || '—'}</p>
          </div>

          <div class="info-block">
            <h3>Payment & Shipping</h3>
            <div class="info-row">
              <span>Payment Status</span>
              <span class="${order.payment_status === 'Paid' ? 'badge-paid' : 'badge-pending'}">${order.payment_status || 'Pending'}</span>
            </div>
            <div class="info-row">
              <span>Payment Method</span>
              <span>Razorpay</span>
            </div>
            <div class="info-row">
              <span>Tracking ID</span>
              <span>${order.awb_code || 'Will be updated soon'}</span>
            </div>
            <div class="info-row">
              <span>Shipping Method</span>
              <span>${order.shipment_status ? 'Standard Delivery' : 'Processing'}</span>
            </div>
            <div class="info-row">
              <span>Order Status</span>
              <span>${order.status || 'Processing'}</span>
            </div>
          </div>
        </div>

        <hr class="divider">

        <!-- ── FOOTER ── -->
        <div class="receipt-footer">
          <div class="footer-info">
            <p>📋 <strong>Return & Exchange:</strong> Within 7 days of delivery. Items must be unused and in original packaging.</p>
            <p>📧 <strong>Support:</strong> support@mindfuelspublisher.com</p>
            <p>🌐 <strong>Website:</strong> www.mindfuelspublisher.com</p>
          </div>
          <div class="thank-you">
            <p>Thank you for shopping with Mindfuels! 📚</p>
            <p class="tagline">Empowering young minds, one book at a time.</p>
          </div>
        </div>
      `;

      document.getElementById('receiptInner').innerHTML = html;
      document.getElementById('receipt').style.display = 'block';
      document.getElementById('loading').style.display = 'none';
      document.title = `Receipt ${displayId} — Mindfuels`;
    }

    // ── Download PDF ──
    function downloadPDF() {
      const element = document.getElementById('receipt');
      const opt = {
        margin:       [0.3, 0.3, 0.3, 0.3],
        filename:     `Mindfuels_${currentDisplayId.replace('#', '')}.pdf`,
        image:        { type: 'jpeg', quality: 0.98 },
        html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
        jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
      };
      html2pdf().set(opt).from(element).save();
    }

    // ── Boot ──
    loadReceipt();
  </script>
</body>
</html>
